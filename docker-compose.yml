version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tools-navigator
    ports:
      - "3001:3001"
    env_file:
      - .env
    extra_hosts:
      # 让容器能够连上宝塔宿主机的 MySQL
      - "host.docker.internal:host-gateway"
    restart: unless-stopped