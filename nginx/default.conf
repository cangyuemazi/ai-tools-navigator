server {
    listen 80;
    server_name _;

    # ---------- 安全头 ----------
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # 生产级 CSP：去掉 unsafe-eval，style 仍允许 unsafe-inline（UI 库需要）
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
        always;

    # ---------- 压缩 ----------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1024;

    # ---------- 反代到 Node ----------
    location / {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # 静态资源长缓存（Vite 带 hash）
    location /assets/ {
        proxy_pass http://app:3001;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件缓存
    location /uploads/ {
        proxy_pass http://app:3001;
        expires    30d;
        add_header Cache-Control "public";
    }

    # 限制上传体积
    client_max_body_size 10m;
}
